jobs:
  release:
    runs-on: ubuntu-24.04-arm
    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true
    - if: github.ref_type == 'tag'
      name: Validate tag (strict semver)
      run: "TAG=\"${{ github.ref_name }}\"\nif [[ ! \"$TAG\" =~ ^v[0-9]+\\.[0-9]+\\\
        .[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then\n  echo \"::error::tag '$TAG' is not a\
        \ strict semver vX.Y.Z[-prerelease] — refusing to release\" >&2\n  exit 1\n\
        fi\n"
      shell: bash
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main
      with:
        extra-conf: lazy-trees = true
    - name: Setup Nix cache
      uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('**/flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-
    - if: github.ref_type == 'tag'
      name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        password: ${{ secrets.GITHUB_TOKEN }}
        registry: ghcr.io
        username: ${{ github.actor }}
    - name: Build + push containers
      run: "set -euo pipefail\nsys=\"$(nix eval --impure --raw --expr builtins.currentSystem)\"\
        \n# Extract to a var first: `for x in $(cmd)` swallows cmd's exit code, so\
        \ a\n# failed eval (e.g. a flake error) would leave the loop empty and the\
        \ job GREEN.\nnames=\"$(nix eval --json \".#containers.$sys\" --apply builtins.attrNames\
        \ | jq -r '.[]')\"\n[ -n \"$names\" ] || { echo \"::error::no containers found\
        \ under .#containers.$sys\" >&2; exit 1; }\n# nixpkgs skopeo rejects the GH\
        \ runner's v1-format /etc/containers/registries.conf\n# (\"must be in v2 format\"\
        ); point it at our own minimal v2 file so it never reads the host's.\nCONTAINERS_REGISTRIES_CONF=\"\
        $(mktemp)\"; export CONTAINERS_REGISTRIES_CONF\nprintf 'unqualified-search-registries\
        \ = []\\n' > \"$CONTAINERS_REGISTRIES_CONF\"\nfor name in $names; do\n  echo\
        \ \"::group::$name\"\n  RESULT=\"$(nix build \".#$name-container\" --no-link\
        \ --print-out-paths --quiet)\"\n  if [ \"${{ github.ref_type }}\" = \"tag\"\
        \ ]; then\n    nix run nixpkgs#skopeo -- copy \\\n      \"docker-archive:$RESULT\"\
        \ \\\n      \"docker://ghcr.io/valeratrades/${name,,}:${{ github.ref_name\
        \ }}\"\n  else\n    echo \"cache-seed build ($name) on ${{ github.ref_name\
        \ }} — skipping GHCR push\"\n  fi\n  echo \"::endgroup::\"\ndone\n"
      shell: bash
    timeout-minutes: 40
name: Release containers
'on':
  push:
    tags:
    - v[0-9]+.*
permissions:
  contents: read
  packages: write
